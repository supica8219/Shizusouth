    <script>
      fetch("/TOP/update.txt?" + Math.floor(Math.random() * 10000))
      .then(response => {
        if (!response.ok) {
          throw new Error('Network response for update.txt was not ok');
        }
        return response.text();
      })
      .then(data =>{
        document.getElementById('update').innerHTML = data
      })
      .catch(error => {
        console.error("Error fetching update.txt:", error);
      });
      function view_menu(){
        var menu=document.getElementById("menu");
        menu.style.display="block";
      }
      function close_menu(){
        var menu=document.getElementById("menu");
        menu.style.display="none";
      }
    </script>
